<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULADORA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
     <link rel="stylesheet" href="estilo.css">
     
</head>
<body>
    <div class="row bg-primary text-white text-right py-3">
        <div class="col-5 ">
            CALCULADORA BASICA
        </div>      
    </div>
     <br> 
    <label for=""> Primer Numero</label>
    <input id="txtN1" type=" number"  class="form-control col-2">
    <label for="">Segundo Numero</label>
    <input id="txtN2" type="number" class="form-control col-2">
     <!-- <label for="">Resultado:</label>
     <input id="txtResultado" type="text" disabled class="form-control col-3">
   <br> <br> <br> --> 
   <button class="btn btn-primary" onclick="sumar()">Sumar</button>
   <br> <br>
   <button class="btn btn-primary" onclick="restar()">Restar</button>
   <br> <br>
   <button class="btn btn-primary"   onclick="multiplicar()">Multiplicar</button>
   <br> <br>
   <button class="btn btn-primary"onclick="dividir()">Dividir</button>


   <script>
    function sumar(){
        console.log("funcion sumar");
        let n1 = parseFloat( document.getElementById("txtN1").value);
        let n2 = parseFloat( document.getElementById("txtN2").value);

        let suma = n1 + n2;
        document.getElementById("txtResultado").value=suma;

        console.log(n1);
        console.log(n2);
        console.log(suma);
       }
    
     function restar(){
        console.log("funcion restar");
        let n1 = parseFloat( document.getElementById("txtN1").value);
        let n2 = parseFloat( document.getElementById("txtN2").value);

        let resta = n1 - n2;
        document.getElementById("txtResultado").value=resta;

        console.log(n1);
        console.log(n2);
        console.log(resta);
       }   
function multiplicar() {
    let n1 = parseFloat(document.getElementById("txtN1").value);
    let n2 = parseFloat(document.getElementById("txtN2").value);

    let resultado = n1 * n2;
    document.getElementById("txtResultado").value = resultado;
    
     console.log(n1);
     console.log(n2);
     console.log(resultado);
}

function dividir() {
    let n1 = parseFloat(document.getElementById("txtN1").value);
    let n2 = parseFloat(document.getElementById("txtN2").value);

    let resultado = n1 / n2;
    document.getElementById("txtResultado").value = resultado;

     console.log(n1);
     console.log(n2);
     console.log(resultado);
}

   </script>

<br> <br>
   <label for="">Resultado:</label>
    <input id="txtResultado" type="text" disabled class="form-control col-2">

</body>
</html>
